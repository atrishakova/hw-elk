input {
  beats {
    port => 5044
    host => "0.0.0.0"
  }

  file {
    path => "/usr/share/logstash/logs/logstash.json"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    codec => json
  }
}

filter {
  # Добавляем общие поля
  mutate {
    add_field => {
      "app_name" => "demo"
      "environment" => "development"
      "service_type" => "springboot"
    }
  }

  # Парсим JSON из логов Filebeat
  if [app] == "demo" {
    mutate {
      add_tag => ["demo-app"]
    }

    if [message] =~ /^\{.*\}$/ {
      json {
        source => "message"
        target => "parsed"
      }

      if [parsed][@timestamp] {
        date {
          match => ["[parsed][@timestamp]", "ISO8601"]
          target => "@timestamp"
        }
      }
    }
  }

  # Если есть exception, добавляем тег
  if [message] =~ /Exception/ or [message] =~ /Error/ {
    mutate {
      add_tag => ["has_exception"]
    }
  }

  # Извлекаем уровень логирования
  if [level] {
    mutate {
      add_field => {
        "log_level" => "%{level}"
      }
    }
  }

  # Добавляем timestamp если отсутствует
  if ![timestamp] {
    mutate {
      add_field => {
        "timestamp" => "%{@timestamp}"
      }
    }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "demo-logs-%{+YYYY.MM.dd}"
  }

  stdout {
    codec => rubydebug
  }
}